<body data-page="focus">

  <!-- HEADER -->
  <header class="page-header">
    <h1 id="pageTitle">Focus / Pomodoro</h1>

    <!-- <div class="header-buttons">
      <div class="hamburger" id="hamburger">☰</div>
    </div> -->
  </header>

  <!-- FULLSCREEN MENU -->
  <!-- <div class="menu-overlay" id="menuOverlay">
    <div class="menu-content">
      <a href="index.html">Daily Task Tracker</a>

  <!-- MAIN CONTENT -->
  <main class="page-container">

    <section class="card focus-card">

      <div class="focus-tabs">
        <button class="focus-tab active" data-mode="pomodoro">Pomodoro</button>
        <button class="focus-tab" data-mode="short">Short Break</button>
        <button class="focus-tab" data-mode="long">Long Break</button>
      </div>

      <div class="focus-timer" id="focusTimer">25:00</div>

      <button id="startFocus" class="focus-main-btn">START</button>

      <div class="focus-message">
        <span id="focusSession">#1</span> Time to focus!
      </div>

    </section>

  </main>

  <!-- OPM PLAYLIST -->
  <audio id="breakMusic">
    <source src="music/opm1.mp3" type="audio/mpeg">
    <source src="music/opm2.mp3" type="audio/mpeg">
    <source src="music/opm3.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>

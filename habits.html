<body data-page="habits">

  <!-- HEADER -->
  <header class="page-header">
    <h1 id="pageTitle">Habit Tracker</h1>

    <!-- <div class="header-buttons">
      <div class="hamburger" id="hamburger">☰</div>
    </div> -->
  </header>

  <!-- FULLSCREEN MENU -->
  <!-- <div class="menu-overlay" id="menuOverlay">
    <div class="menu-content">
      <a href="index.html">Daily Task Tracker</a>
      <a href="habits.html">Habit Tracker</a>
      <a href="goals.html">Goal Tracker</a>
      <a href="focus.html">Focus / Pomodoro</a>
      <a href="notes.html">Notes / Brain Dump</a>
    </div>
  </div> -->

  <!-- MAIN CONTENT -->
  <main class="page-container">

    <section class="card habits-card">

      <!-- TOP: BIG TODAY CIRCLE + SMALL WEEK CIRCLE CENTERED -->
      <div class="habits-top-center">
        <div class="circle big-circle">
          <svg viewBox="0 0 36 36">
            <path class="bg"
              d="M18 2.0845
                 a 15.9155 15.9155 0 0 1 0 31.831
                 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path id="habitsDailyArc" class="fg" stroke-dasharray="0,100"
              d="M18 2.0845
                 a 15.9155 15.9155 0 0 1 0 31.831
                 a 15.9155 15.9155 0 0 1 0 -31.831"/>
          </svg>
          <div class="circle-label">
            <span id="habitsDailyPercent">0%</span>
            <small>Today</small>
          </div>
        </div>

        <div class="circle small-circle">
          <svg viewBox="0 0 36 36">
            <path class="bg"
              d="M18 2.0845
                 a 15.9155 15.9155 0 0 1 0 31.831
                 a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path id="habitsWeeklyArc" class="fg" stroke-dasharray="0,100"
              d="M18 2.0845
                 a 15.9155 15.9155 0 0 1 0 31.831
                 a 15.9155 15.9155 0 0 1 0 -31.831"/>
          </svg>
          <div class="circle-label small">
            <span id="habitsWeeklyPercent">0%</span>
            <small>Week</small>
          </div>
        </div>
      </div>

      <!-- TITLE + DAY DROPDOWN -->
      <div class="habits-header-row">
        <h2 class="section-title">Today's Habits</h2>
        <select id="habitDaySelect">
          <option value="Sunday">Sunday</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>

      <!-- TABLE HEADER -->
      <div class="task-header">
        <span>Habit</span>
        <span>Done</span>
        <span></span>
      </div>

      <!-- HABIT LIST -->
      <ul class="task-list" id="habitsList"></ul>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
